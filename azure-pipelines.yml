trigger: none
pool: Default
name: applicationPipeline
stages:
  - stage: CIPipeline
    displayName: "Continues Integration Pipeline"
    jobs:
      - job: 
        steps:
        - task: NodeTaskRunnerInstaller@0
          inputs:
            nodeVersion: '16'
        - task: PowerShell@2
          inputs:
            targetType: 'inline'
            script: 'npm install'

        - task: PowerShell@2
          inputs:
            targetType: 'inline'
            script: 'npm run build'
        - task: PublishPipelineArtifact@1
          inputs:
            targetPath: '$(System.DefaultWorkingDirectory)\build'
            artifact: 'todo-artifact'
            publishLocation: 'pipeline'
  - stage: Deploy
    jobs:
      - job: 
        steps:
        - task: SSH@0
          inputs:
            sshEndpoint: 'Deploymentssh'
            runOptions: 'inline'
            inline: |
              #!/bin/bash
              
              set -e
              
              echo "Checking Nginx..."
              
              if dpkg -s nginx >/dev/null 2>&1; then
                  echo "Nginx already installed"
              else
                  echo "Installing Nginx..."
                  sudo apt update -y
                  sudo apt install -y nginx
                  echo "Nginx installed"
              fi
              
              echo "Starting Nginx..."
              sudo systemctl start nginx
              
              # Suppress harmless stderr
              sudo systemctl enable nginx 2>/dev/null
              
              echo "Done 🚀"
            readyTimeout: '20000'
        
        